name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install API client from latest GitHub Release
        run: |
          pip install prekit-edge-node-api \
            --find-links https://github.com/alpamayo-solutions/prekit/releases/latest/download/ \
            || pip install prekit-edge-node-api --pre --find-links https://github.com/alpamayo-solutions/prekit/releases/

      - name: Install SDK with dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/

      - name: Run tests
        run: pytest tests/ -v

  build-wheel:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: pip install build

      - name: Build wheel
        run: python -m build

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
